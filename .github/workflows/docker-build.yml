name: Build Docker e Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

jobs:

  # ── Job 1: Build + Segurança ──────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Construir imagem Docker (multistage)
        run: docker build -t minha-pagina-nginx .

      - name: Inspecionar tamanho da imagem final
        run: docker images minha-pagina-nginx

      - name: Escanear vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: minha-pagina-nginx
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Job 2: Deploy (só na branch main, após build passar) ──
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fazer upload dos arquivos estáticos
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
